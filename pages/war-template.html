<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="referrer" content="no-referrer">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>War Story — Chronicles of War</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="story-page">

<div id="preloader">
  <div class="preloader-inner">
    <div class="preloader-emblem">⚔</div>
    <div class="preloader-text">LOADING HISTORY...</div>
    <div class="preloader-bar"><div class="preloader-fill"></div></div>
  </div>
</div>
<div id="cursor"></div>
<div id="cursor-follower"></div>
<canvas id="particles-canvas"></canvas>

<nav id="main-nav">
  <div class="nav-logo">
    <a href="../index.html" style="display:flex;align-items:center;gap:10px">
      <span class="nav-sword">⚔</span>
      <span class="nav-title">CHRONICLES OF WAR</span>
    </a>
  </div>
  <div class="nav-links">
    <a href="../index.html" class="nav-link">Home</a>
    <a href="all-wars.html" class="nav-link">All Wars</a>
  </div>
</nav>

<section class="story-hero" id="storyHero">
  <div class="story-hero-bg" id="heroBg"></div>
  <div class="story-hero-overlay"></div>
  <div class="story-hero-content" id="heroContent"></div>
</section>

<div class="story-body" id="storyBody"></div>

<footer id="main-footer">
  <div class="footer-emblem">⚔</div>
  <div class="footer-title">CHRONICLES OF WAR</div>
  <p class="footer-tagline">History: Because apparently we need to be reminded how bad things can get.</p>
  <div class="footer-links">
    <a href="../index.html">Home</a>
    <a href="all-wars.html">All Wars</a>
  </div>
</footer>

<script src="../js/particles.js"></script>
<script src="../js/cursor.js"></script>
<script src="../js/main.js"></script>
<script src="../js/war-stories.js"></script>
<script>
  // Get war ID from URL parameter or filename
  const params = new URLSearchParams(window.location.search);
  const warId = params.get('war') || window.location.pathname.split('/').pop().replace('war-', '').replace('.html', '');
  
  const story = window.WAR_STORIES && window.WAR_STORIES[warId];
  
  if (story) {
    document.title = story.title + ' — Chronicles of War';
    
    // Hero
    document.getElementById('heroBg').style.backgroundImage = `url('${story.hero_image}')`;
    document.getElementById('heroContent').innerHTML = `
      <div class="story-era-tag">${story.era}</div>
      <h1 class="story-title">${story.title}</h1>
      <p class="story-subtitle">${story.subtitle}</p>
      <div class="story-meta">
        <div class="story-meta-item"><strong>${story.duration}</strong>DURATION</div>
        <div class="story-meta-item"><strong>${story.location}</strong>LOCATION</div>
        <div class="story-meta-item"><strong>${story.casualties}</strong>CASUALTIES</div>
        <div class="story-meta-item"><strong>${story.result}</strong>RESULT</div>
      </div>
    `;

    // Chapters
    const body = document.getElementById('storyBody');
    story.chapters.forEach((ch, i) => {
      const div = document.createElement('div');
      div.className = 'story-chapter reveal';
      div.innerHTML = `
        <div class="chapter-number">CHAPTER ${['ONE','TWO','THREE','FOUR','FIVE'][i] || i+1}</div>
        <h2 class="chapter-title">${ch.title}</h2>
        ${ch.content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
      `;
      body.appendChild(div);
    });

    // Nav back
    const nav = document.createElement('div');
    nav.className = 'prev-next-nav reveal';
    nav.innerHTML = `
      <a href="all-wars.html" class="nav-war-btn">
        <div class="nav-war-label">← BACK TO</div>
        <div class="nav-war-title">All Wars</div>
      </a>
    `;
    body.appendChild(nav);
  } else {
    // Fallback
    document.getElementById('storyBody').innerHTML = `
      <div style="text-align:center; padding:100px 40px">
        <h2 style="font-family:var(--font-display);font-size:40px;color:var(--gold);margin-bottom:20px">Story Coming Soon</h2>
        <p style="color:var(--smoke);font-style:italic;margin-bottom:40px">This war's full story is being written. History is patient — you might as well be too.</p>
        <a href="all-wars.html" class="cta-btn cta-primary">BROWSE OTHER WARS</a>
      </div>
    `;
  }
</script>
  <script src="../js/imgfix.js"></script>
</body>
</html>
